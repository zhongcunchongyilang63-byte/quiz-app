<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad AI単語クイズ（一覧・削除機能付き）</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f1f3f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .mode-selector {
            display: flex;
            background-color: #e9ecef;
            padding: 6px;
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            background: none;
            border-radius: 25px;
            cursor: pointer;
            color: #495057;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #212529;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .score-board {
            background-color: #495057;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
        }

        /* クイズカード */
        .card-container {
            width: 100%;
            height: 280px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            cursor: pointer;
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
        }

        .card-front { border: 2px solid #dee2e6; background: #fff; color: #212529; }
        .card-back { border: 2px solid #a5d6a7; background: #e8f5e9; color: #2e7d32; transform: rotateY(180deg); }

        .text { font-size: 46px; font-weight: bold; }
        .audio-btn { background: #e7f5ff; border: none; color: #1c7ed6; padding: 10px 20px; border-radius: 30px; font-size: 18px; margin-top: 15px; cursor: pointer; }

        /* ボタン */
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .btn { flex: 1; padding: 18px; font-size: 20px; font-weight: bold; border: none; border-radius: 18px; cursor: pointer; }
        .btn-correct { background-color: #fa5252; color: white; }
        .btn-wrong { background-color: #4dabf7; color: white; }
        .btn-next { background-color: #212529; color: white; width: 100%; padding: 15px; font-size: 18px; border-radius: 15px; border: none; margin-bottom: 30px; }

        /* スキャン・追加エリア */
        .section-box {
            background-color: white;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 25px;
            text-align: left;
        }

        .section-box h3 { margin-top: 0; color: #212529; text-align: center; border-bottom: 2px solid #f1f3f5; padding-bottom: 10px; }
        .file-input-btn { background-color: #5c7cfa; color: white; padding: 15px 25px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; display: block; text-align: center; margin: 0 auto 15px auto; width: fit-content; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .input-group label { font-weight: bold; color: #495057; }
        .input-group input { padding: 12px; font-size: 16px; border: 1px solid #ced4da; border-radius: 8px; }
        .btn-add { background-color: #37b24d; color: white; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%; }
        #loading { color: #f59f00; font-weight: bold; display: none; text-align: center; margin: 10px 0; }

        /* 📋 単語一覧リストのスタイル */
        .word-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto; /* 縦スクロールできるようにする */
        }

        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            font-size: 18px;
        }

        .word-item:last-child { border-bottom: none; }

        .word-info { display: flex; flex-direction: column; gap: 4px; }
        .word-en { font-weight: bold; color: #1c7ed6; }
        .word-ja { color: #495057; font-size: 16px; }

        .btn-delete {
            background-color: #fff5f5;
            color: #fa5252;
            border: 1px solid #ffa8a8;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-delete:active { background-color: #ffe3e3; }
    </style>
</head>
<body>

<div class="app-container">

    <div class="mode-selector">
        <button id="modeEnJa" class="mode-btn active" onclick="changeMode('en-ja')">🔤 英 ➔ 日</button>
        <button id="modeJaEn" class="mode-btn" onclick="changeMode('ja-en')">🇯🇵 日 ➔ 英</button>
    </div>

    <div class="score-board">
        通算記録: <span id="totalCorrect">0</span> / <span id="totalAttempt">0</span> 問 (正解率: <span id="rate">0</span>%)
    </div>

    <div class="card-container">
        <div class="card" id="quizCard" onclick="flipCard()">
            <div class="card-face card-front">
                <div style="color:#868e96; font-size:14px; margin-bottom:10px;" id="frontLabel">問題</div>
                <div class="text" id="frontText">apple</div>
                <button class="audio-btn" id="audioBtn" onclick="playAudio(event)">🔊 音声</button>
            </div>
            <div class="card-face card-back">
                <div style="color:#868e96; font-size:14px; margin-bottom:10px;" id="backLabel">答え</div>
                <div class="text" id="backText">りんご</div>
            </div>
        </div>
    </div>

    <div class="row">
        <button class="btn btn-wrong" onclick="handleResult(false)">✕ 苦手</button>
        <button class="btn btn-correct" onclick="handleResult(true)">◯ 覚えた</button>
    </div>
    <button class="btn-next" onclick="nextQuestion()">次のランダム問題へ ➔</button>

    <div class="section-box" style="border: 2px dashed #adb5bd;">
        <h3>✨ カメラで単語をスキャンして追加</h3>
        <label class="file-input-btn">
            📷 カメラを起動して文字を写す
            <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display: none;" onchange="scanImage(this)">
        </label>
        <div id="loading">🔍 AIが文字を読み取り中...</div>

        <div class="input-group">
            <label>スキャンされた単語（英語）</label>
            <input type="text" id="newFront" placeholder="ここに英語が入ります">
            <label>単語の意味（日本語）</label>
            <input type="text" id="newBack" placeholder="例: りんご、走る、など">
            <button class="btn-add" onclick="addNewWord()">この単語をリストに追加する</button>
        </div>
    </div>

    <div class="section-box">
        <h3>📋 現在の単語帳一覧 (<span id="wordCount">0</span>語)</h3>
        <ul class="word-list" id="wordListContainer">
            </ul>
    </div>
</div>

<script>
    const defaultWords = [
        { front: "apple", back: "りんご" },
        { front: "computer", back: "コンピュータ" },
        { front: "application", back: "アプリ" }
    ];

    let quizList = JSON.parse(localStorage.getItem('my_quiz_list')) || defaultWords;
    let currentIndex = 0;
    let currentMode = 'en-ja';

    let totalCorrect = parseInt(localStorage.getItem('quiz_correct')) || 0;
    let totalAttempt = parseInt(localStorage.getItem('quiz_attempt')) || 0;

    const card = document.getElementById('quizCard');
    const frontText = document.getElementById('frontText');
    const backText = document.getElementById('backText');
    const frontLabel = document.getElementById('frontLabel');
    const backLabel = document.getElementById('backLabel');
    const audioBtn = document.getElementById('audioBtn');

    function init() {
        shuffleQuiz();
        updateScoreBoard();
        showQuestion();
        renderWordList(); // 一覧の表示
    }

    function changeMode(mode) {
        currentMode = mode;
        document.getElementById('modeEnJa').classList.toggle('active', mode === 'en-ja');
        document.getElementById('modeJaEn').classList.toggle('active', mode === 'ja-en');
        if (card.classList.contains('is-flipped')) card.classList.remove('is-flipped');
        showQuestion();
    }

    function shuffleQuiz() {
        if(quizList.length === 0) return;
        for (let i = quizList.length - 1; i > 0; i--) {
            const r = Math.floor(Math.random() * (i + 1));
            [quizList[i], quizList[r]] = [quizList[r], quizList[i]];
        }
        currentIndex = 0;
    }

    function showQuestion() {
        if(quizList.length === 0) {
            frontText.innerText = "単語がありません";
            backText.innerText = "追加してください";
            return;
        }
        const currentWord = quizList[currentIndex];
        if (currentMode === 'en-ja') {
            frontLabel.innerText = "単語 (英語)";
            frontText.innerText = currentWord.front;
            backLabel.innerText = "意味 (日本語)";
            backText.innerText = currentWord.back;
            audioBtn.style.display = 'inline-block';
        } else {
            frontLabel.innerText = "意味 (日本語)";
            frontText.innerText = currentWord.back;
            backLabel.innerText = "単語 (英語)";
            backText.innerText = currentWord.front;
            audioBtn.style.display = 'none';
        }
    }

    function flipCard() { card.classList.toggle('is-flipped'); }

    function playAudio(event) {
        event.stopPropagation();
        if(quizList.length === 0) return;
        const utterance = new SpeechSynthesisUtterance(quizList[currentIndex].front);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    function handleResult(isCorrect) {
        if(quizList.length === 0) return;
        totalAttempt++;
        if (isCorrect) totalCorrect++;
        localStorage.setItem('quiz_correct', totalCorrect);
        localStorage.setItem('quiz_attempt', totalAttempt);
        updateScoreBoard();
        nextQuestion();
    }

    function updateScoreBoard() {
        document.getElementById('totalCorrect').innerText = totalCorrect;
        document.getElementById('totalAttempt').innerText = totalAttempt;
        const rate = totalAttempt > 0 ? Math.round((totalCorrect / totalAttempt) * 100) : 0;
        document.getElementById('rate').innerText = rate;
    }

    function nextQuestion() {
        if (card.classList.contains('is-flipped')) {
            card.classList.remove('is-flipped');
            setTimeout(changeToNext, 300);
        } else {
            changeToNext();
        }
    }

    function changeToNext() {
        currentIndex++;
        if (currentIndex >= quizList.length) shuffleQuiz();
        showQuestion();
    }

    // スキャン処理
    function scanImage(input) {
        if (!input.files || !input.files[0]) return;
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        const file = input.files[0];
        
        Tesseract.recognize(file, 'eng')
            .then(({ data: { text } }) => {
                const cleanedText = text.trim().replace(/[^a-zA-Z ]/g, ""); 
                document.getElementById('newFront').value = cleanedText;
                alert("文字の読み取りが完了しました！");
            })
            .catch(err => {
                console.error(err);
                alert("読み取りに失敗しました。");
            })
            .finally(() => { loading.style.display = 'none'; });
    }

    // 単語の追加
    function addNewWord() {
        const front = document.getElementById('newFront').value.trim();
        const back = document.getElementById('newBack').value.trim();

        if (!front || !back) {
            alert("単語と意味の両方を入力してください。");
            return;
        }

        quizList.unshift({ front: front, back: back });
        saveAndRefresh();

        document.getElementById('newFront').value = "";
        document.getElementById('newBack').value = "";
        alert(`「${front}」を追加しました！`);
    }

    // 📋 単語一覧画面を生成して描画する関数
    function renderWordList() {
        const container = document.getElementById('wordListContainer');
        document.getElementById('wordCount').innerText = quizList.length;
        container.innerHTML = ""; // 一旦クリア

        if (quizList.length === 0) {
            container.innerHTML = "<li style='text-align:center; padding:20px; color:#868e96;'>単語が登録されていません。</li>";
            return;
        }

        // 登録されている単語をループで一覧表示に組み立てる
        quizList.forEach((word, index) => {
            const li = document.createElement('li');
            li.className = 'word-item';
            li.innerHTML = `
                <div class="word-info">
                    <span class="word-en">${word.front}</span>
                    <span class="word-ja">${word.back}</span>
                </div>
                <button class="btn-delete" onclick="deleteWord(${index})">削除</button>
            `;
            container.appendChild(li);
        });
    }

    // 単語を1件削除する関数
    function deleteWord(index) {
        if(confirm(`「${quizList[index].front}」を単語帳から削除しますか？`)) {
            quizList.splice(index, 1); // 指定した位置のデータを削除
            saveAndRefresh();
        }
    }

    // データの保存と画面全体の更新
    function saveAndRefresh() {
        localStorage.setItem('my_quiz_list', JSON.stringify(quizList));
        renderWordList();
        currentIndex = 0;
        showQuestion();
    }

    init();
</script>

</body>
</html>
