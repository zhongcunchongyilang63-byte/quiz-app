<div id="custom-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 6, 10, 0.85); backdrop-filter: blur(8px); z-index: 100; justify-content: center; align-items: center;">
    <div id="result-box" style="background: rgba(20, 24, 35, 0.95); border-radius: 20px; padding: 40px; text-align: center; max-width: 450px; width: 90%; transform: scale(0.7); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 50px rgba(0,0,0,0.8);">
        <div id="result-icon" style="font-size: 64px; margin-bottom: 20px; text-shadow: 0 0 20px currentColor;"></div>
        <div id="result-title" style="font-family: 'Orbitron'; font-size: 32px; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px;"></div>
        <div id="result-msg" style="color: var(--text-light); font-size: 18px; margin-bottom: 30px; line-height: 1.6;"></div>
        <button class="btn" id="result-next-btn" onclick="closeResultDialog()" style="width: 100%; padding: 15px; font-size: 18px; font-family: 'Orbitron'; letter-spacing: 1px;">NEXT MISSION</button>
    </div>
</div>

<script>
// ==========================================
// 既存の JavaScript 関数を以下に書き換え
// ==========================================

// 1. インプットテストの解答判定ロジック（アラートを自作UIに変更）
function submitTypingAnswer() {
    let inputField = document.getElementById('type-input');
    let input = inputField.value.trim().toLowerCase();
    let correct = vocabData[currentTypeIdx].en.toLowerCase();

    if (input === correct) {
        history.totalAnswers++;
        showCustomResult(true, 'CORRECT', `見事な解答です！<br><span style="color:var(--neon-blue); font-weight:bold;">${vocabData[currentTypeIdx].en}</span> = ${vocabData[currentTypeIdx].ja}`);
        currentTypeIdx = (currentTypeIdx + 1) % vocabData.length;
    } else {
        showCustomResult(false, 'ACCESS DENIED', `不正確な入力です。<br>正解は <span style="color:var(--neon-purple); font-weight:bold;">${correct}</span> (${vocabData[currentTypeIdx].ja}) です。`);
    }
}

// 7. 4択クイズの解答判定ロジック（ここもかっこいいUIに連動！）
function checkQuiz(selected) {
    history.quizTotal++;
    history.totalAnswers++;
    if(selected === currentQuizWord.ja) {
        history.quizCorrect++;
        showCustomResult(true, 'EXCELLENT', `正解！脳に刻み込まれました。<br><span style="color:var(--neon-blue); font-weight:bold;">${currentQuizWord.en}</span> = ${currentQuizWord.ja}`, true);
    } else {
        showCustomResult(false, 'ERROR', `ミス！正解は <span style="color:var(--neon-purple); font-weight:bold;">${currentQuizWord.ja}</span> でした。`, true);
    }
}

// カっこいいダイアログを表示するシステム
let isQuizNext = false;
function showCustomResult(isCorrect, title, message, isQuiz = false) {
    isQuizNext = isQuiz;
    const overlay = document.getElementById('custom-overlay');
    const box = document.getElementById('result-box');
    const icon = document.getElementById('result-icon');
    const titleEl = document.getElementById('result-title');
    const msgEl = document.getElementById('result-msg');
    const btn = document.getElementById('result-next-btn');

    // 状態のリセット
    overlay.style.display = 'flex';
    
    if(isCorrect) {
        box.style.border = '2px solid var(--neon-blue)';
        box.style.boxShadow = '0 0 40px rgba(0, 242, 255, 0.25)';
        icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
        icon.style.color = 'var(--neon-blue)';
        titleEl.style.color = 'var(--neon-blue)';
        titleEl.style.textShadow = '0 0 10px rgba(0, 242, 255, 0.5)';
        btn.style.background = 'linear-gradient(135deg, var(--neon-blue), #00a2ff)';
        btn.style.color = '#000';
    } else {
        box.style.border = '2px solid var(--neon-purple)';
        box.style.boxShadow = '0 0 40px rgba(254, 1, 154, 0.25)';
        icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        icon.style.color = 'var(--neon-purple)';
        titleEl.style.color = 'var(--neon-purple)';
        titleEl.style.textShadow = '0 0 10px rgba(254, 1, 154, 0.5)';
        btn.style.background = 'linear-gradient(135deg, var(--neon-purple), #ff0055)';
        btn.style.color = '#fff';
    }

    titleEl.innerText = title;
    msgEl.innerHTML = message;

    // アニメーション発火
    setTimeout(() => {
        box.style.transform = 'scale(1)';
        box.style.opacity = '1';
    }, 10);
    
    // Enterキーでもダイアログを閉じられるようにイベントを追加
    window.addEventListener('keydown', handleDialogEnter);
}

function handleDialogEnter(e) {
    if (e.key === 'Enter') {
        closeResultDialog();
    }
}

function closeResultDialog() {
    const overlay = document.getElementById('custom-overlay');
    const box = document.getElementById('result-box');
    
    box.style.transform = 'scale(0.7)';
    box.style.opacity = '0';
    
    setTimeout(() => {
        overlay.style.display = 'none';
        window.removeEventListener('keydown', handleDialogEnter);
        
        // 次の問題をセットアップ
        if (isQuizNext) {
            nextQuiz();
        } else {
            initTypingTest();
        }
    }, 200);
}
</script>
