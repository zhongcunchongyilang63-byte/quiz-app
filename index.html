<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO VOCAB - Ultimate Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0b10;
            --panel-bg: rgba(20, 24, 35, 0.8);
            --neon-blue: #00f2ff;
            --neon-purple: #fe019a;
            --text-light: #e2e8f0;
            --text-muted: #64748b;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans JP', 'Orbitron', sans-serif; }
        body {
            background: radial-gradient(circle at top, #1a1c29 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        nav {
            width: 260px;
            background: var(--panel-bg);
            border-right: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Orbitron';
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
        }

        .nav-btn {
            background: transparent; border: none; color: var(--text-muted); padding: 15px 20px;
            text-align: left; font-size: 16px; cursor: pointer; border-radius: 12px; margin-bottom: 10px;
            transition: all 0.3s; display: flex; align-items: center; gap: 15px;
        }

        .nav-btn:hover, .nav-btn.active {
            color: var(--neon-blue); background: rgba(0, 242, 255, 0.1);
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
        }

        main { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .view-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 28px; margin-bottom: 25px; font-family: 'Orbitron'; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .card { background: var(--panel-bg); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); backdrop-filter: blur(10px); margin-bottom: 20px; }
        
        input[type="text"], textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 15px; border-radius: 10px; color: #fff; font-size: 18px; outline: none; transition: all 0.3s;
        }
        input[type="text"]:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

        .btn { background: linear-gradient(135deg, var(--neon-blue), #00a2ff); color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; transition: all 0.3s; font-size: 16px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4); }

        /* 1. インプットテスト用 */
        .typing-container { display: flex; gap: 20px; align-items: center; }
        .word-q { flex: 1; font-size: 40px; text-align: center; font-weight: bold; }
        .canvas-area { border: 1px dashed var(--text-muted); border-radius: 12px; background: rgba(0,0,0,0.2); position: relative; width: 100%; max-width: 400px; height: 160px; }
        #canvas { cursor: crosshair; width: 100%; height: 100%; border-radius: 12px; }

        /* 2. リアル赤シート用 */
        .redsheet-workspace { position: relative; width: 100%; height: calc(100vh - 200px); border-radius: 16px; overflow: hidden; background: #111424; border: 1px solid rgba(255,255,255,0.1); }
        .vocab-scroll-area { width: 100%; height: 100%; padding: 20px; overflow-y: auto; }
        .red-sheet-row { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .hidden-word { font-size: 24px; font-weight: bold; color: #00ffaa; }
        .real-red-sheet { position: absolute; left: 0; top: 0; width: 100%; height: 50%; background: rgba(255, 0, 50, 0.85); box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: ns-resize; z-index: 5; mix-blend-mode: multiply; border-bottom: 6px solid #ff3366; }
        .sheet-handle { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); background: #ff3366; color: #fff; padding: 4px 30px; border-radius: 10px 10px 0 0; font-size: 12px; font-weight: bold; pointer-events: none; }

        /* 3. ダッシュボード */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-box { text-align: center; padding: 30px; }
        .stat-box.num { font-size: 48px; font-family: 'Orbitron'; color: var(--neon-blue); text-shadow: 0 0 10px rgba(0,242,255,0.5); }

        /* 5. スキャン */
        .scan-preview { width: 100%; height: 200px; border: 2px dashed rgba(0,242,255,0.3); display: flex; justify-content: center; align-items: center; border-radius: 12px; margin-bottom: 15px; color: var(--text-muted); }

        /* 7. 4択クイズ */
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; color: #fff; border-radius: 12px; cursor: pointer; font-size: 18px; transition: all 0.2s; }
        .option-btn:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--neon-blue); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NEO VOCAB</div>
        <button class="nav-btn active" onclick="switchView('typing')"><i class="fa-solid fa-keyboard"></i>Input Test</button>
        <button class="nav-btn" onclick="switchView('redsheet')"><i class="fa-solid fa-eye-slash"></i>Red Sheet</button>
        <button class="nav-btn" onclick="switchView('quiz')"><i class="fa-solid fa-gamepad"></i>4-Choice Quiz</button>
        <button class="nav-btn" onclick="switchView('translate')"><i class="fa-solid fa-language"></i>Translate</button>
        <button class="nav-btn" onclick="switchView('scan')"><i class="fa-solid fa-camera"></i>AI Scan</button>
        <button class="nav-btn" onclick="switchView('dashboard')"><i class="fa-solid fa-chart-bar"></i>Dashboard</button>
    </nav>

    <main>
        <!-- 1. 入力・手書きテスト -->
        <section id="typing" class="view-section active">
            <h2>Input Test (手書き・キーボード)</h2>
            <div class="card">
                <div class="typing-container">
                    <div class="word-q" id="type-q">影響を与える</div>
                    <div style="flex:1; display:flex; flex-direction:column; gap:15px;">
                        <input type="text" id="type-input" placeholder="英語を入力（Enterまたは判定ボタンで次へ）" onkeydown="checkTyping(event)">
                        <button class="btn" onclick="submitTypingAnswer()">解答を判定する</button>
                        <div class="canvas-area">
                            <canvas id="canvas" width="400" height="160"></canvas>
                            <button class="btn" style="position:absolute; bottom:5px; right:5px; padding:5px 10px; font-size:12px;" onclick="clearCanvas()">消去</button>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: right;">
                    <button class="btn" style="background:transparent; color:#fff; border:1px solid;" onclick="speakCurrentWord('typing')"><i class="fa-solid fa-volume-high"></i> 音声を聞く</button>
                </div>
            </div>
        </section>

        <!-- 2. リアル赤シート -->
        <section id="redsheet" class="view-section">
            <h2>Real Red Sheet (1枚の赤シート)</h2>
            <p style="color:var(--text-muted); margin-bottom:15px;">※ 赤シートの下側のフチ（PULL）を指やマウスで上下に動かせます</p>
            <div class="redsheet-workspace">
                <div class="real-red-sheet" id="red-sheet">
                    <div class="sheet-handle">PULL</div>
                </div>
                <div class="vocab-scroll-area" id="redsheet-list"></div>
            </div>
        </section>

        <!-- 3. ダッシュボード -->
        <section id="dashboard" class="view-section">
            <h2>Dashboard (学習履歴)</h2>
            <div class="stats-grid">
                <div class="card stat-box">
                    <div style="color:var(--text-muted)">総解答数</div>
                    <div class="stat-box num" id="stat-total">0</div>
                </div>
                <div class="card stat-box">
                    <div style="color:var(--text-muted)">覚えた単語</div>
                    <div class="stat-box num" id="stat-learned">0</div>
                </div>
                <div class="card stat-box">
                    <div style="color:var(--text-muted)">クイズ正解率</div>
                    <div class="stat-box num" id="stat-accuracy">0%</div>
                </div>
            </div>
        </section>

        <!-- 4. 翻訳機能 -->
        <section id="translate" class="view-section">
            <h2>AI Translate</h2>
            <div class="card">
                <textarea id="trans-input" rows="4" placeholder="翻訳したいテキストを入力..."></textarea>
                <div style="margin: 15px 0; text-align: right;"><button class="btn" onclick="runTranslate()">翻訳を実行</button></div>
                <div id="trans-output" style="padding:15px; background:rgba(0,0,0,0.2); border-radius:10px; min-height:60px; color:var(--neon-blue)">結果がここに表示されます。</div>
            </div>
        </section>

        <!-- 5. 写真スキャン -->
        <section id="scan" class="view-section">
            <h2>AI Image Scan</h2>
            <div class="card">
                <div class="scan-preview" id="scan-preview"><p>画像をドロップ、またはファイルを選択</p></div>
                <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="simulateScan()">
                <button class="btn" onclick="document.getElementById('file-input').click()">画像を選択してスキャン</button>
            </div>
        </section>

        <!-- 7. 4択クイズ -->
        <section id="quiz" class="view-section">
            <h2>4-Choice Quiz</h2>
            <div class="card">
                <div class="word-q" id="quiz-q">influence</div>
                <div class="quiz-options" id="quiz-options"></div>
                <div style="margin-top: 20px; text-align: right;"><button class="btn" onclick="speakCurrentWord('quiz')"><i class="fa-solid fa-volume-high"></i> 音声を聞く</button></div>
            </div>
        </section>
    </main>

    <script>
        // グローバルデータ
        let vocabData = [
            { id: 1, ja: "影響を与える", en: "influence", learned: false },
            { id: 2, ja: "～を維持する", en: "maintain", learned: false },
            { id: 3, ja: "正確な", en: "accurate", learned: false },
            { id: 4, ja: "機会", en: "opportunity", learned: false },
            { id: 5, ja: "～を解決する", en: "resolve", learned: false },
            { id: 6, ja: "不可欠な", en: "essential", learned: false }
        ];

        let history = { totalAnswers: 0, quizCorrect: 0, quizTotal: 0 };
        let currentTypeIdx = 0;
        let currentQuizWord = null;

        // 画面切り替え
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            event.currentTarget.classList.add('active');

            if(viewId === 'typing') initTypingTest();
            if(viewId === 'redsheet') renderRedSheet();
            if(viewId === 'quiz') nextQuiz();
            if(viewId === 'dashboard') updateDashboard();
        }

        // --- 1. インプットテスト修正版 ---
        function initTypingTest() {
            if(vocabData.length === 0) return;
            document.getElementById('type-q').innerText = vocabData[currentTypeIdx].ja;
            document.getElementById('type-input').value = '';
            clearCanvas();
        }

        function checkTyping(e) {
            if (e.key === 'Enter') {
                submitTypingAnswer();
            }
        }

        function submitTypingAnswer() {
            let inputField = document.getElementById('type-input');
            let input = inputField.value.trim().toLowerCase();
            let correct = vocabData[currentTypeIdx].en.toLowerCase();

            if (input === correct) {
                alert('正解！🎉');
                history.totalAnswers++;
                currentTypeIdx = (currentTypeIdx + 1) % vocabData.length;
                initTypingTest();
            } else {
                alert(`不正確！正解は「${correct}」です。もう一度挑戦！`);
            }
        }

        // 手書きキャンバス
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 4;

        function getTouchPos(canvasDom, touchEvent) {
            let rect = canvasDom.getBoundingClientRect();
            return {
                x: (touchEvent.touches[0].clientX - rect.left) * (canvasDom.width / rect.width),
                y: (touchEvent.touches[0].clientY - rect.top) * (canvasDom.height / rect.height)
            };
        }
        function getMousePos(canvasDom, mouseEvent) {
            let rect = canvasDom.getBoundingClientRect();
            return {
                x: (mouseEvent.clientX - rect.left) * (canvasDom.width / rect.width),
                y: (mouseEvent.clientY - rect.top) * (canvasDom.height / rect.height)
            };
        }

        canvas.addEventListener('mousedown', (e) => { drawing = true; let pos = getMousePos(canvas, e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); });
        canvas.addEventListener('mousemove', (e) => { if(drawing) { let pos = getMousePos(canvas, e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); } });
        window.addEventListener('mouseup', () => drawing = false);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; let pos = getTouchPos(canvas, e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(drawing) { let pos = getTouchPos(canvas, e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); } });
        window.addEventListener('touchend', () => drawing = false);

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }


        // --- 2. リアル赤シートロジック ---
        function renderRedSheet() {
            const container = document.getElementById('redsheet-list');
            container.innerHTML = '';
            vocabData.filter(w => !w.learned).forEach(word => {
                const div = document.createElement('div');
                div.className = 'red-sheet-row';
                div.innerHTML = `
                    <div>
                        <span style="font-size:16px; color:var(--text-muted); margin-right:30px; display:inline-block; width:120px;">${word.ja}</span>
                        <span class="hidden-word">${word.en}</span>
                    </div>
                    <div>
                        <button class="btn" style="background:var(--success); color:#fff; padding:6px 12px; font-size:14px;" onclick="markAsLearned(${word.id})">覚えた</button>
                        <button class="btn" style="background:transparent; color:var(--text-light); border:1px solid rgba(255,255,255,0.2); padding:6px 12px;" onclick="speakWord('${word.en}')"><i class="fa-solid fa-volume-high"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function markAsLearned(id) {
            let word = vocabData.find(w => w.id === id);
            if(word) word.learned = true;
            renderRedSheet();
        }

        // 赤シートドラッグ
        const sheet = document.getElementById('red-sheet');
        const workspace = document.querySelector('.redsheet-workspace');
        let isDragging = false;

        function startDrag(e) { isDragging = true; sheet.style.transition = 'none'; }
        function doDrag(e) {
            if (!isDragging) return;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let rect = workspace.getBoundingClientRect();
            let relativeY = clientY - rect.top;
            if (relativeY < 0) relativeY = 0;
            if (relativeY > rect.height) relativeY = rect.height;
            sheet.style.height = ((relativeY / rect.height) * 100) + '%';
        }
        function stopDrag() { isDragging = false; }

        sheet.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', stopDrag);
        sheet.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', doDrag);
        window.addEventListener('touchend', stopDrag);


        // --- 3. ダッシュボード ---
        function updateDashboard() {
            document.getElementById('stat-total').innerText = history.totalAnswers;
            document.getElementById('stat-learned').innerText = vocabData.filter(w => w.learned).length;
            let rate = history.quizTotal === 0 ? 0 : Math.round((history.quizCorrect / history.quizTotal) * 100);
            document.getElementById('stat-accuracy').innerText = rate + '%';
        }

        // --- 4. 翻訳 ---
        function runTranslate() {
            let text = document.getElementById('trans-input').value;
            if(!text) return;
            document.getElementById('trans-output').innerText = "「" + text + "」の解析・連携が完了しました。";
        }

        // --- 5. スキャン ---
        function simulateScan() {
            document.getElementById('scan-preview').innerHTML = `<p style="color:var(--neon-blue)"><i class="fa-solid fa-spinner fa-spin"></i> 文字を検出中...</p>`;
            setTimeout(() => {
                vocabData.push({ id: Date.now(), ja: "学校", en: "school", learned: false });
                document.getElementById('scan-preview').innerHTML = `<p style="color:var(--success)"><i class="fa-solid fa-circle-check"></i> 新規検出: 「school (学校)」を追加しました！</p>`;
            }, 1200);
        }

        // --- 6. 音声 ---
        function speakWord(text) {
            let u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            speechSynthesis.speak(u);
        }
        function speakCurrentWord(type) {
            if(type === 'typing') speakWord(vocabData[currentTypeIdx].en);
            if(type === 'quiz' && currentQuizWord) speakWord(currentQuizWord.en);
        }

        // --- 7. 4択クイズ ---
        function nextQuiz() {
            if(vocabData.length < 4) {
                document.getElementById('quiz-options').innerHTML = "クイズには4つ以上の単語が必要です。";
                return;
            }
            currentQuizWord = vocabData[Math.floor(Math.random() * vocabData.length)];
            document.getElementById('quiz-q').innerText = currentQuizWord.en;
            
            let options = [currentQuizWord.ja];
            while(options.length < 4) {
                let randomJa = vocabData[Math.floor(Math.random() * vocabData.length)].ja;
                if(!options.includes(randomJa)) options.push(randomJa);
            }
            options.sort(() => Math.random() - 0.5);

            const optContainer = document.getElementById('quiz-options');
            optContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkQuiz(opt);
                optContainer.appendChild(btn);
            });
        }

        function checkQuiz(selected) {
            history.quizTotal++;
            history.totalAnswers++;
            if(selected === currentQuizWord.ja) {
                alert('正解！🎉');
                history.quizCorrect++;
            } else {
                alert('残念！正解は: ' + currentQuizWord.ja);
            }
            nextQuiz();
        }

        // ページロード時の初期化
        window.onload = () => {
            initTypingTest();
        };
    </script>
</body>
</html>
