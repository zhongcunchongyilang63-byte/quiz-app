<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad AI単語クイズ - Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            padding-bottom: 90px; /* 下部バーのスペース */
        }

        .app-container {
            width: 100%;
            max-width: 540px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 📄 画面切り替え用のコンテナ */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* 🔄 3つのモード切り替えメニュー */
        .mode-selector {
            display: flex;
            background-color: #e2e8f0;
            padding: 4px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px 4px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            background: none;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-sub);
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background-color: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* スコア＆リセット */
        .score-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }

        .score-board {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
        }
        .score-board span {
            color: var(--text-main);
            font-weight: 700;
        }

        .btn-reset {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            background-color: #fef2f2;
        }

        /* クイズカード */
        .card-container {
            width: 100%;
            height: 300px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            box-sizing: border-box;
            background: var(--card-bg);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card-back { transform: rotateY(180deg); background-color: #f8fafc; border: 2px solid var(--primary-light); }

        .card-label { font-size: 12px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
        .text { font-size: 42px; font-weight: 800; color: var(--text-main); word-break: break-word; }
        .audio-btn { background: var(--primary-light); border: none; color: var(--primary); padding: 10px 24px; border-radius: 99s; font-size: 15px; font-weight: 600; margin-top: 20px; cursor: pointer; }

        /* スペル入力エリア */
        .input-box-area {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            display: none;
        }

        .spell-input {
            width: 100%;
            padding: 14px;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            margin-bottom: 12px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .spell-input:focus { border-color: var(--primary); }

        .spell-result { font-size: 18px; font-weight: 700; margin-top: 10px; min-height: 24px; }

        /* ボタン */
        .row { display: flex; gap: 12px; margin-bottom: 12px; }
        .btn { flex: 1; padding: 16px; font-size: 18px; font-weight: 700; border: none; border-radius: 16px; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-correct { background-color: var(--success); color: white; }
        .btn-wrong { background-color: var(--danger); color: white; }
        .btn-check { background-color: var(--primary); color: white; width: 100%; padding: 14px; font-size: 18px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; }
        .btn-next { background-color: var(--text-main); color: white; width: 100%; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 16px; border: none; cursor: pointer; }

        /* セクションボックス */
        .section-box { background-color: var(--card-bg); border-radius: 24px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); margin-bottom: 20px; }
        .section-box h3 { margin-top: 0; font-size: 18px; color: var(--text-main); margin-bottom: 16px; }
        .file-input-btn { background-color: var(--primary-light); color: var(--primary); padding: 14px 20px; font-size: 16px; font-weight: 700; border-radius: 14px; cursor: pointer; display: block; text-align: center; margin-bottom: 16px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .input-group label { font-size: 13px; font-weight: 700; color: var(--text-sub); }
        .input-group input { padding: 12px; font-size: 15px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; }
        .btn-add { background-color: var(--primary); color: white; padding: 14px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; margin-top: 8px; cursor: pointer; }
        #loading { color: #d97706; font-weight: 700; display: none; text-align: center; margin: 10px 0; }

        /* 単語一覧 */
        .word-list { list-style: none; padding: 0; margin: 0; }
        .word-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f1f5f9; }
        .word-item:last-child { border-bottom: none; }
        .word-info { display: flex; flex-direction: column; gap: 2px; }
        .word-en { font-weight: 700; color: var(--text-main); font-size: 17px; }
        .word-ja { color: var(--text-sub); font-size: 14px; }
        .btn-delete { background-color: #fff5f5; color: var(--danger); border: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }

        /* 📱 下部ナビゲーションバー固定 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: calc(env(safe-area-inset-bottom) / 2);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            background: none;
            border: none;
            width: 33.3%;
            height: 100%;
            gap: 4px;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 22px;
        }
    </style>
</head>
<body>

<div class="app-container">

    <div id="pageQuiz" class="page active">
        <div class="mode-selector">
            <button id="modeEnJa" class="mode-btn active" onclick="changeMode('en-ja')">🔤 英➔日</button>
            <button id="modeJaEn" class="mode-btn" onclick="changeMode('ja-en')">🇯🇵 日➔英</button>
            <button id="modeSpell" class="mode-btn" onclick="changeMode('spell')">✍️ スペル記入</button>
        </div>

        <div class="score-container">
            <div class="score-board">
                通算記録: <span id="totalCorrect">0</span> / <span id="totalAttempt">0</span> 問 (<span id="rate">0</span>%)
            </div>
            <button class="btn-reset" onclick="resetScore()">スコア初期化</button>
        </div>

        <div class="card-container">
            <div class="card" id="quizCard" onclick="flipCard()">
                <div class="card-face card-front">
                    <div class="card-label" id="frontLabel">問題</div>
                    <div class="text" id="frontText">apple</div>
                    <button class="audio-btn" id="audioBtn" onclick="playAudio(event)">🔊 音声</button>
                </div>
                <div class="card-face card-back">
                    <div class="card-label" id="backLabel">答え</div>
                    <div class="text" id="backText">りんご</div>
                </div>
            </div>
        </div>

        <div class="input-box-area" id="inputBoxArea">
            <input type="text" id="userSpellInput" class="spell-input" placeholder="ここにスペルを入力" autocomplete="off" autocapitalize="none">
            <button class="btn-check" onclick="checkSpell()">答え合わせする</button>
            <div id="spellResult" class="spell-result"></div>
        </div>

        <div class="row" id="judgeButtons">
            <button class="btn btn-wrong" onclick="handleResult(false)">✕ 苦手</button>
            <button class="btn btn-correct" onclick="handleResult(true)">◯ 覚えた</button>
        </div>
        <button class="btn-next" onclick="nextQuestion()">次のランダム問題へ ➔</button>
    </div>

    <div id="pageWords" class="page">
        <div class="section-box" style="border: 2px dashed #cbd5e1; background-color: #f8fafc;">
            <h3>📸 カメラでスキャン追加</h3>
            <label class="file-input-btn">
                📷 カメラを起動して写す
                <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display: none;" onchange="scanImage(this)">
            </label>
            <div id="loading">🔍 AIが文字を読み取り中...</div>

            <div class="input-group">
                <label>英語</label>
                <input type="text" id="newFront" placeholder="ここに英語が入ります">
                <label>意味（日本語）</label>
                <input type="text" id="newBack" placeholder="例: りんご、走る">
                <button class="btn-add" onclick="addNewWord()">この単語をリストに追加</button>
            </div>
        </div>

        <div class="section-box">
            <h3>📋 登録中の単語帳 (<span id="wordCount">0</span>語)</h3>
            <ul class="word-list" id="wordListContainer"></ul>
        </div>
    </div>

</div>

<div class="bottom-nav">
    <button id="navQuiz" class="nav-item active" onclick="switchPage('quiz')">
        <span class="nav-icon">🎯</span>
        <span>クイズ練習</span>
    </button>
    <button id="navWords" class="nav-item" onclick="switchPage('words')">
        <span class="nav-icon">📋</span>
        <span>単語帳・追加</span>
    </button>
</div>

<script>
    const defaultWords = [
        { front: "apple", back: "りんご" },
        { front: "computer", back: "コンピュータ" },
        { front: "application", back: "アプリ" }
    ];

    let quizList = JSON.parse(localStorage.getItem('my_quiz_list')) || defaultWords;
    let currentIndex = 0;
    let currentMode = 'en-ja'; 

    let totalCorrect = parseInt(localStorage.getItem('quiz_correct')) || 0;
    let totalAttempt = parseInt(localStorage.getItem('quiz_attempt')) || 0;

    const card = document.getElementById('quizCard');
    const frontText = document.getElementById('frontText');
    const backText = document.getElementById('backText');
    const frontLabel = document.getElementById('frontLabel');
    const backLabel = document.getElementById('backLabel');
    const audioBtn = document.getElementById('audioBtn');
    
    const judgeButtons = document.getElementById('judgeButtons');
    const inputBoxArea = document.getElementById('inputBoxArea');
    const userSpellInput = document.getElementById('userSpellInput');
    const spellResult = document.getElementById('spellResult');

    function init() {
        if (!Array.isArray(quizList) || quizList.length === 0) {
            quizList = [...defaultWords];
        }
        shuffleQuiz();
        updateScoreBoard();
        showQuestion();
        renderWordList();
    }

    // 📱 タブの画面切り替え
    function switchPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

        if (pageName === 'quiz') {
            document.getElementById('pageQuiz').classList.add('active');
            document.getElementById('navQuiz').classList.add('active');
            showQuestion();
        } else if (pageName === 'words') {
            document.getElementById('pageWords').classList.add('active');
            document.getElementById('navWords').classList.add('active');
            renderWordList();
        }
    }

    function changeMode(mode) {
        currentMode = mode;
        document.getElementById('modeEnJa').classList.toggle('active', mode === 'en-ja');
        document.getElementById('modeJaEn').classList.toggle('active', mode === 'ja-en');
        document.getElementById('modeSpell').classList.toggle('active', mode === 'spell');
        
        if (card.classList.contains('is-flipped')) card.classList.remove('is-flipped');

        if (mode === 'spell') {
            judgeButtons.style.display = 'none';
            inputBoxArea.style.display = 'block';
            userSpellInput.value = "";
            spellResult.innerText = "";
        } else {
            judgeButtons.style.display = 'flex';
            inputBoxArea.style.display = 'none';
        }

        showQuestion();
    }

    function shuffleQuiz() {
        if(quizList.length === 0) return;
        for (let i = quizList.length - 1; i > 0; i--) {
            const r = Math.floor(Math.random() * (i + 1));
            [quizList[i], quizList[r]] = [quizList[r], quizList[i]];
        }
        currentIndex = 0;
    }

    function showQuestion() {
        if(quizList.length === 0) {
            frontText.innerText = "単語がありません";
            backText.innerText = "追加してください";
            return;
        }
        const currentWord = quizList[currentIndex];
        
        if (currentMode === 'en-ja') {
            frontLabel.innerText = "単語 (英語)";
            frontText.innerText = currentWord.front;
            backLabel.innerText = "意味 (日本語)";
            backText.innerText = currentWord.back;
            audioBtn.style.display = 'inline-block';
        } else if (currentMode === 'ja-en') {
            frontLabel.innerText = "意味 (日本語)";
            frontText.innerText = currentWord.back;
            backLabel.innerText = "単語 (英語)";
            backText.innerText = currentWord.front;
            audioBtn.style.display = 'none';
        } else if (currentMode === 'spell') {
            frontLabel.innerText = "この日本語のスペルを入力してね";
            frontText.innerText = currentWord.back; 
            backLabel.innerText = "正解のスペル";
            backText.innerText = currentWord.front; 
            audioBtn.style.display = 'none';
        }
    }

    function checkSpell() {
        if(quizList.length === 0) return;
        const uInput = userSpellInput.value.trim().toLowerCase();
        const correctAnswer = quizList[currentIndex].front.trim().toLowerCase();
        totalAttempt++;

        if (uInput === correctAnswer) {
            spellResult.innerText = "⭕ 正解！カンペキ！";
            spellResult.style.color = "var(--success)";
            totalCorrect++;
            if (!card.classList.contains('is-flipped')) card.classList.add('is-flipped'); 
        } else {
            spellResult.innerText = `❌ 不正解 (正解: ${correctAnswer})`;
            spellResult.style.color = "var(--danger)";
            if (!card.classList.contains('is-flipped')) card.classList.add('is-flipped'); 
        }

        localStorage.setItem('quiz_correct', totalCorrect);
        localStorage.setItem('quiz_attempt', totalAttempt);
        updateScoreBoard();
    }

    function flipCard() { card.classList.toggle('is-flipped'); }

    function playAudio(event) {
        event.stopPropagation();
        if(quizList.length === 0) return;
        const utterance = new SpeechSynthesisUtterance(quizList[currentIndex].front);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    function handleResult(isCorrect) {
        if(quizList.length === 0) return;
        totalAttempt++;
        if (isCorrect) totalCorrect++;
        localStorage.setItem('quiz_correct', totalCorrect);
        localStorage.setItem('quiz_attempt', totalAttempt);
        updateScoreBoard();
        nextQuestion();
    }

    function updateScoreBoard() {
        document.getElementById('totalCorrect').innerText = totalCorrect;
        document.getElementById('totalAttempt').innerText = totalAttempt;
        const rate = totalAttempt > 0 ? Math.round((totalCorrect / totalAttempt) * 100) : 0;
        document.getElementById('rate').innerText = rate;
    }

    function resetScore() {
        if (confirm("通算記録をリセットしますか？")) {
            totalCorrect = 0;
            totalAttempt = 0;
            localStorage.setItem('quiz_correct', 0);
            localStorage.setItem('quiz_attempt', 0);
            updateScoreBoard();
        }
    }

    function nextQuestion() {
        if (card.classList.contains('is-flipped')) {
            card.classList.remove('is-flipped');
            setTimeout(changeToNext, 300);
        } else {
            changeToNext();
        }
    }

    function changeToNext() {
        currentIndex++;
        if (currentIndex >= quizList.length) shuffleQuiz();
        userSpellInput.value = "";
        spellResult.innerText = "";
        showQuestion();
    }

    function scanImage(input) {
        if (!input.files || !input.files[0]) return;
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        const file = input.files[0];
        
        Tesseract.recognize(file, 'eng')
            .then(({ data: { text } }) => {
                const cleanedText = text.trim().replace(/[^a-zA-Z ]/g, "").toLowerCase(); 
                document.getElementById('newFront').value = cleanedText;
                alert("文字の読み取りが完了しました！入力欄を確認してください。");
            })
            .catch(err => {
                console.error(err);
                alert("読み取りに失敗しました。直接入力も可能です。");
            })
            .finally(() => { loading.style.display = 'none'; });
    }

    function addNewWord() {
        const front = document.getElementById('newFront').value.trim().toLowerCase();
        const back = document.getElementById('newBack').value.trim();

        if (!front || !back) {
            alert("単語と意味の両方を入力してください。");
            return;
        }

        quizList.unshift({ front: front, back: back });
        saveAndRefresh();

        document.getElementById('newFront').value = "";
        document.getElementById('newBack').value = "";
        alert(`「${front}」を追加しました！`);
    }

    function renderWordList() {
        const container = document.getElementById('wordListContainer');
        if (!container) return;
        document.getElementById('wordCount').innerText = quizList.length;
        container.innerHTML = "";

        if (quizList.length === 0) {
            container.innerHTML = "<li style='text-align:center; padding:20px; color:var(--text-sub);'>単語が登録されていません。</li>";
            return;
        }

        quizList.forEach((word, index) => {
            const li = document.createElement('li');
            li.className = 'word-item';
            li.innerHTML = `
                <div class="word-info">
                    <span class="word-en">${word.front}</span>
                    <span class="word-ja">${word.back}</span>
                </div>
                <button class="btn-delete" onclick="deleteWord(${index})">削除</button>
            `;
            container.appendChild(li);
        });
    }

    function deleteWord(index) {
        if(confirm(`「${quizList[index].front}」を削除しますか？`)) {
            quizList.splice(index, 1);
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('my_quiz_list', JSON.stringify(quizList));
        renderWordList();
        currentIndex = 0;
        userSpellInput.value = "";
        spellResult.innerText = "";
        showQuestion();
    }

    init();
</script>

</body>
</html>
